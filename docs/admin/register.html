<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Showroom — PrasuNova</title>
  <meta name="description" content="Register your tile showroom on PrasuNova. Get your branded link in 60 seconds." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23A8432A'/%3E%3Ctext x='32' y='44' font-family='Arial,Helvetica,sans-serif' font-size='30' font-weight='700' fill='%23F1EFEA' text-anchor='middle'%3EPN%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .form-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .form-row input { width:100%; box-sizing:border-box; }
    .slug-preview { font-size:12px; margin-top:4px; }
  </style>
</head>
<body class="auth-glass">
<div class="back-link-wrap">
  <a href="/" class="back-btn"><span class="back-btn-arrow">←</span><span class="back-btn-full">Back to showroom</span><span class="back-btn-short">Showroom</span></a>
</div>
<div class="auth-wrap" id="step1">
  <h2>Create Your Showroom</h2>
  <div class="form-row"><label>Shop Name</label><input id="shop-name" type="text" placeholder="e.g. Raj Tiles" /></div>
  <div class="form-row">
    <label>Shop URL Slug</label>
    <input id="slug" type="text" placeholder="e.g. mansigranite" />
    <div class="slug-preview">Your URL: showroom.prasunova.com/s/?shop=<span id="slug-preview">...</span></div>
  </div>
  <div class="form-row"><label>Email</label><input id="reg-email" type="email" /></div>
  <label class="consent-row" style="display:flex;gap:8px;align-items:flex-start;font-size:13px;margin:12px 0;">
    <input type="checkbox" id="consent-check" />
    <span>I agree to the <a href="../privacy.html" target="_blank">Privacy Policy</a> and
    <a href="../terms.html" target="_blank">Terms of Service</a>, and consent to processing my
    account data as described.</span>
  </label>
  <p id="reg-error"></p>
  <button id="btn-send-otp" class="btn-primary full-width">Send Verification Code</button>
  <div class="auth-links"><a href="index.html">Already have an account? Login</a></div>
</div>

<div class="auth-wrap" id="step2" style="display:none">
  <h2>Verify Email</h2>
  <p style="font-size:14px;text-align:center">Enter the 6-digit code sent to your email and set a password.</p>
  <div class="form-row"><label>Verification Code</label><input id="otp-input" type="text" maxlength="6" placeholder="123456" /></div>
  <div class="form-row"><label>Password (min 8 chars)</label><input id="reg-password" type="password" /></div>
  <p id="otp-error" style="font-size:13px;min-height:18px;text-align:center"></p>
  <button id="btn-verify" class="btn-primary full-width">Create Account</button>
</div>

<script type="module" src="register.js"></script>
</body>
</html>
