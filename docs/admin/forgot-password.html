<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — PrasuNova Showroom</title>
  <meta name="description" content="Reset your PrasuNova Showroom admin password." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .auth-wrap { max-width:360px; margin:80px auto; padding:32px; border:1px solid var(--border); border-radius:12px; }
    .auth-wrap h2 { margin-top:0; text-align:center; }
    .form-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .form-row label { font-size:13px; color:var(--muted); }
    .form-row input { padding:8px; border:1px solid var(--border); border-radius:4px; font-size:14px; width:100%; box-sizing:border-box; }
    .err { color:#e55; font-size:13px; min-height:18px; text-align:center; }
    .auth-links { font-size:13px; text-align:center; margin-top:12px; }
    .auth-links a { color:var(--brand-primary); text-decoration:none; }
  </style>
</head>
<body>
<div style="text-align:center;padding:20px 0 0;">
  <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:0.5px;">← Back to PrasuNova Showroom</a>
</div>
<div class="auth-wrap" id="step1">
  <h2>Forgot Password</h2>
  <div class="form-row"><label>Email</label><input id="fp-email" type="email" /></div>
  <p id="fp-error" class="err"></p>
  <button id="btn-send-reset" class="btn-primary" style="width:100%">Send Reset Code</button>
  <div class="auth-links"><a href="index.html">Back to login</a></div>
</div>
<div class="auth-wrap" id="step2" style="display:none">
  <h2>Reset Password</h2>
  <div class="form-row"><label>6-digit code</label><input id="reset-otp" type="text" maxlength="6" /></div>
  <div class="form-row"><label>New Password</label><input id="new-password" type="password" /></div>
  <p id="reset-error" class="err"></p>
  <button id="btn-reset" class="btn-primary" style="width:100%">Set New Password</button>
</div>
<script type="module" src="forgot-password.js"></script>
</body>
</html>
