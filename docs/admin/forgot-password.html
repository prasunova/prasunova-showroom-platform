<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — PrasuNova Showroom</title>
  <meta name="description" content="Reset your PrasuNova Showroom admin password." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23A8432A'/%3E%3Ctext x='32' y='44' font-family='Arial,Helvetica,sans-serif' font-size='30' font-weight='700' fill='%23F1EFEA' text-anchor='middle'%3EPN%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .form-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .form-row input { width:100%; box-sizing:border-box; }
  </style>
</head>
<body class="auth-glass">
<div class="back-link-wrap">
  <a href="/" class="back-btn"><span class="back-btn-arrow">←</span><span class="back-btn-full">Back to showroom</span><span class="back-btn-short">Showroom</span></a>
</div>
<div class="auth-wrap" id="step1">
  <h2>Forgot Password</h2>
  <div class="form-row"><label>Email</label><input id="fp-email" type="email" /></div>
  <p id="fp-error" class="err"></p>
  <button id="btn-send-reset" class="btn-primary full-width">Send Reset Code</button>
  <div class="auth-links"><a href="index.html">Back to login</a></div>
</div>
<div class="auth-wrap" id="step2" style="display:none">
  <h2>Reset Password</h2>
  <div class="form-row"><label>6-digit code</label><input id="reset-otp" type="text" maxlength="6" /></div>
  <div class="form-row"><label>New Password</label><input id="new-password" type="password" /></div>
  <p id="reset-error" class="err"></p>
  <button id="btn-reset" class="btn-primary full-width">Set New Password</button>
</div>
<script type="module" src="forgot-password.js"></script>
</body>
</html>
