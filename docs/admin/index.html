<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — PrasuNova Showroom</title>
  <meta name="description" content="Manage your tile showroom catalog. Upload tiles, view your showroom link, and manage your shop." />
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .tile-admin-info { padding:10px; font-size:13px; }
    .tile-admin-info strong { display:block; margin-bottom:4px; }
    .form-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .form-row input, .form-row select { width:100%; box-sizing:border-box; }
  </style>
</head>
<body class="auth-glass admin-glass">
<div id="login-section">
  <div class="back-link-wrap">
    <a href="/" class="back-btn"><span class="back-btn-arrow">←</span><span class="back-btn-full">Back to showroom</span><span class="back-btn-short">Showroom</span></a>
  </div>
  <div class="login-wrap">
    <h2>Shop Owner Login</h2>
    <div class="form-row"><label>Email</label><input id="login-email" type="email" autocomplete="email" /></div>
    <div class="form-row"><label>Password</label><input id="login-password" type="password" autocomplete="current-password" /></div>
    <p id="login-error"></p>
    <button id="btn-login" class="btn-primary full-width">Login</button>
    <div class="login-links">
      <a href="forgot-password.html">Forgot password?</a> · <a href="register.html">Register</a>
    </div>
  </div>
</div>

<div id="admin-loading" class="admin-loading" style="display:none">
  <div class="spinner"></div>
</div>

<div id="admin-section" class="admin-shell" style="display:none">
  <header class="admin-header-bar">
    <div class="admin-header-left">
      <a href="/" class="back-btn"><span class="back-btn-arrow">←</span><span class="back-btn-full">Back to showroom</span><span class="back-btn-short">Showroom</span></a>
      <div>
        <div class="admin-header-shop" id="admin-shop-name"></div>
        <a class="admin-header-link" id="admin-slug" href="#" target="_blank" rel="noopener"></a>
      </div>
    </div>
    <div class="admin-header-right">
      <span class="profile-plan-badge" id="admin-plan"></span>
      <button id="btn-logout" class="icon-btn">Logout</button>
    </div>
  </header>

  <div class="admin-workspace">
    <aside class="admin-sidebar glass-card">
      <h3>Add Tile</h3>
      <div class="form-row"><label>Name</label><input id="tile-name" type="text" placeholder="e.g. Carrara White" /></div>
      <div class="form-row">
        <label>Category</label>
        <select id="tile-category">
          <option value="marble">Marble</option>
          <option value="granite">Granite</option>
          <option value="vitrified">Vitrified</option>
          <option value="ceramic">Ceramic</option>
          <option value="anti_skid">Anti-skid</option>
          <option value="wooden">Wooden</option>
        </select>
      </div>
      <div class="form-row"><label>Finish (optional)</label><input id="tile-finish" type="text" placeholder="e.g. Polished" /></div>
      <div class="form-row"><label>Price per sqft (₹)</label><input id="tile-price" type="number" min="0" step="0.01" value="0" /></div>
      <div class="form-row"><label>Image</label><input id="tile-image" type="file" accept="image/*" /></div>
      <p id="upload-error" style="color:#e55;font-size:13px;min-height:18px"></p>
      <button id="btn-upload-tile" class="btn-primary full-width">Upload Tile</button>
    </aside>

    <section class="admin-catalogue glass-card">
      <div class="admin-catalogue-head">
        <h3>Your Tiles <span id="tiles-count" style="font-size:14px;color:var(--muted)"></span></h3>
      </div>
      <div id="tile-admin-grid" class="tile-admin-grid"></div>
    </section>
  </div>

  <div class="admin-account glass-card">
    <h3>Account &amp; Privacy</h3>
    <div class="profile-rows">
      <div class="profile-row"><span>Email</span><strong id="admin-email"></strong></div>
    </div>
    <div class="profile-edit-row">
      <input id="edit-shop-name" type="text" placeholder="Shop name" />
      <button id="btn-save-shop-name" class="icon-btn">Save</button>
    </div>
    <div class="profile-actions">
      <button id="btn-export-data" class="icon-btn">Download my data</button>
      <button id="btn-delete-account" class="btn-delete">Delete my account</button>
      <span class="profile-hint">Permanently removed after 30 days.</span>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script>
  if (localStorage.getItem('showroom_admin_token')) {
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('admin-loading').style.display = 'flex';
  }
</script>
<script type="module" src="app.js"></script>
<footer style="text-align:center;padding:24px;font-size:12px;color:var(--muted)">
  <a href="/privacy.html">Privacy</a> · <a href="/terms.html">Terms</a> · <a href="/data-deletion.html">Data Deletion</a>
</footer>
</body>
</html>
