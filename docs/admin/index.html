<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Supraa Showroom</title>
  <meta name="description" content="Manage your tile showroom catalog. Upload tiles, view your showroom link, and manage your shop." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .admin-wrap { max-width:900px; margin:40px auto; padding:0 20px; }
    .admin-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
    .tile-admin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
    .tile-admin-card { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .tile-admin-card img { width:100%; height:120px; object-fit:cover; }
    .tile-admin-info { padding:10px; font-size:13px; }
    .tile-admin-info strong { display:block; margin-bottom:4px; }
    .btn-delete { background:none; border:none; color:#e55; cursor:pointer; font-size:12px; }
    .upload-form { border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:32px; }
    .upload-form h3 { margin-top:0; }
    .form-row { margin-bottom:12px; display:flex; flex-direction:column; gap:4px; }
    .form-row label { font-size:13px; color:var(--muted); }
    .form-row input, .form-row select { padding:8px; border:1px solid var(--border); border-radius:4px; font-size:14px; }
    .login-wrap { max-width:360px; margin:80px auto; padding:32px; border:1px solid var(--border); border-radius:12px; }
    .login-wrap h2 { margin-top:0; text-align:center; }
    .login-wrap .form-row input { width:100%; box-sizing:border-box; }
    .login-links { font-size:13px; text-align:center; margin-top:12px; }
    .login-links a { color:var(--brand-primary); text-decoration:none; }
    #login-error { color:#e55; font-size:13px; text-align:center; min-height:18px; }
  </style>
</head>
<body>
<div style="text-align:center;padding:20px 0 0;">
  <a href="/" style="font-size:13px;color:var(--muted);text-decoration:none;letter-spacing:0.5px;">← Back to Supraa Showroom</a>
</div>
<div id="login-section">
  <div class="login-wrap">
    <h2>Shop Owner Login</h2>
    <div class="form-row"><label>Email</label><input id="login-email" type="email" autocomplete="email" /></div>
    <div class="form-row"><label>Password</label><input id="login-password" type="password" autocomplete="current-password" /></div>
    <p id="login-error"></p>
    <button id="btn-login" class="btn-primary" style="width:100%">Login</button>
    <div class="login-links">
      <a href="forgot-password.html">Forgot password?</a> · <a href="register.html">Register</a>
    </div>
  </div>
</div>

<div id="admin-section" class="admin-wrap" style="display:none">
  <div class="admin-header">
    <div>
      <strong id="admin-shop-name"></strong>
      <span id="admin-slug" style="font-size:13px;color:var(--muted);margin-left:8px"></span>
    </div>
    <button id="btn-logout" class="icon-btn">Logout</button>
  </div>

  <div class="upload-form">
    <h3>Add Tile</h3>
    <div class="form-row"><label>Name</label><input id="tile-name" type="text" placeholder="e.g. Carrara White" /></div>
    <div class="form-row">
      <label>Category</label>
      <select id="tile-category">
        <option value="marble">Marble</option>
        <option value="granite">Granite</option>
        <option value="vitrified">Vitrified</option>
        <option value="ceramic">Ceramic</option>
        <option value="anti_skid">Anti-skid</option>
      </select>
    </div>
    <div class="form-row"><label>Finish (optional)</label><input id="tile-finish" type="text" placeholder="e.g. Polished" /></div>
    <div class="form-row"><label>Price per sqft (₹)</label><input id="tile-price" type="number" min="0" step="0.01" value="0" /></div>
    <div class="form-row"><label>Image</label><input id="tile-image" type="file" accept="image/*" /></div>
    <p id="upload-error" style="color:#e55;font-size:13px;min-height:18px"></p>
    <button id="btn-upload-tile" class="btn-primary">Upload Tile</button>
  </div>

  <h3>Your Tiles <span id="tiles-count" style="font-size:14px;color:var(--muted)"></span></h3>
  <div id="tile-admin-grid" class="tile-admin-grid"></div>
</div>

<div id="toast" class="toast hidden"></div>
<script type="module" src="app.js"></script>
</body>
</html>
