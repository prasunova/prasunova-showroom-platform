<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Showroom — Supraa</title>
  <meta name="description" content="Preview granite, marble, and tile textures on real room photos. Powered by AI. Share with your customers instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>
<header class="app-header">
  <div class="logo">
    <a href="/" style="text-decoration:none;display:flex;align-items:center;gap:12px;">
      <span class="logo-mg" id="logo-badge">SS</span>
      <div class="logo-text">
        <span class="logo-name" id="logo-shop-name">Digital Showroom</span>
        <span class="logo-tagline">Tile Visualizer</span>
      </div>
    </a>
  </div>
  <nav class="header-nav">
    <button id="btn-catalog" class="nav-btn active">Catalog</button>
    <button id="btn-upload"  class="nav-btn">Upload Room</button>
  </nav>
</header>

<main>
  <div id="view-gallery" class="view-active">
    <div id="room-filter" class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="kitchen">Kitchen</button>
      <button class="filter-btn" data-filter="bathroom">Bathroom</button>
      <button class="filter-btn" data-filter="living">Living</button>
      <button class="filter-btn" data-filter="outdoor">Outdoor</button>
    </div>
    <div id="room-grid" class="room-grid"></div>
  </div>

  <div id="view-room" class="view-hidden">
    <div class="room-view-header">
      <button id="btn-back" class="icon-btn">← Back</button>
      <span id="room-name-label"></span>
      <div id="surface-toggle" class="surface-toggle">
        <button class="surface-btn active" data-surface="floor">Floor</button>
        <button class="surface-btn" data-surface="wall">Wall</button>
      </div>
      <button id="btn-download" class="icon-btn">Download</button>
      <button id="btn-share"    class="icon-btn">Share</button>
    </div>
    <div class="canvas-wrap">
      <div id="canvas-loading" class="canvas-loading hidden">Processing…</div>
      <canvas id="tile-canvas"></canvas>
    </div>
  </div>
</main>

<aside id="tile-sidebar" class="tile-sidebar">
  <div id="tile-tabs" class="tile-tabs">
    <button class="tab-btn active" data-cat="all">All</button>
    <button class="tab-btn" data-cat="marble">Marble</button>
    <button class="tab-btn" data-cat="granite">Granite</button>
    <button class="tab-btn" data-cat="vitrified">Vitrified</button>
    <button class="tab-btn" data-cat="ceramic">Ceramic</button>
    <button class="tab-btn" data-cat="anti_skid">Anti-skid</button>
  </div>
  <div id="tile-grid" class="tile-grid"></div>
</aside>

<div id="upload-modal" class="modal hidden">
  <div class="modal-content">
    <button id="modal-close" class="modal-close">×</button>
    <div id="upload-step-1" class="upload-step active">
      <h3>Upload Your Room</h3>
      <div id="file-drop-zone" class="drop-zone"><span>Drop a photo here or click to browse</span></div>
      <input id="file-input" type="file" accept="image/*" hidden />
      <select id="category-select" class="select">
        <option value="living_room">Living Room</option>
        <option value="kitchen">Kitchen</option>
        <option value="bathroom">Bathroom</option>
        <option value="bedroom">Bedroom</option>
        <option value="entrance">Entrance</option>
        <option value="balcony">Balcony</option>
        <option value="toilet">Toilet</option>
        <option value="shower">Shower</option>
      </select>
      <div class="cf-turnstile" data-sitekey="" id="turnstile-widget"></div>
      <button id="btn-process" class="btn-primary" disabled>Analyze Room</button>
    </div>
    <div id="upload-step-2" class="upload-step hidden">
      <div class="spinner"></div>
      <p id="processing-msg">Processing…</p>
      <p id="elapsed-label"></p>
    </div>
    <div id="upload-step-3" class="upload-step hidden">
      <p id="error-title" class="error-title"></p>
      <p id="error-msg"></p>
      <button id="btn-retry" class="btn-primary">Try Again</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script type="module" src="app.js"></script>
<script type="module" src="upload.js"></script>
</body>
</html>
